name: بناء برنامج التثبيت (Setup.exe)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Windows installers (ia32 + x64)
        run: npm run dist-win

      - name: Upload installers as artifact
        uses: actions/upload-artifact@v4
        with:
          name: تثبيت-نظام-الكاشير-Setup
          path: dist/*.exe
